<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentHub Pricing Tool — Prodapt</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f5;color:#1a1a1a}
:root{--red:#C62828;--dark:#1a1a2e;--blue:#4fc3f7;--amber:#FFB74D;--green:#81C784}
.app{display:grid;grid-template-columns:220px 1fr 280px;grid-template-rows:60px 1fr;min-height:100vh}
.topbar{grid-column:1/-1;background:var(--dark);display:flex;align-items:center;padding:0 1.5rem;gap:1rem}
.topbar img{height:32px}
.topbar span{color:#aaa;font-size:.85rem;letter-spacing:.05em}
.sidebar{background:#fff;border-right:1px solid #e0e0e0;padding:1rem 0;overflow-y:auto}
.main{padding:2rem;overflow-y:auto}
.panel{background:#fff;border-left:1px solid #e0e0e0;padding:1.5rem;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:.6rem;padding:.6rem 1.2rem;cursor:pointer;font-size:.88rem;color:#555;border:none;background:none;width:100%;text-align:left;transition:background .15s}
.nav-item:hover{background:#fafafa}
.nav-item.active{background:#fff5f5;color:var(--red);font-weight:600;border-right:3px solid var(--red)}
.nav-item .dot{width:8px;height:8px;border-radius:50%;background:#ddd;flex-shrink:0}
.nav-item.done .dot{background:var(--green)}
.nav-item.active .dot{background:var(--red)}
.nav-divider{height:1px;background:#eee;margin:.5rem 0}
.reset-btn{margin:1rem;width:calc(100% - 2rem);padding:.5rem;background:none;border:1px solid #ddd;border-radius:6px;cursor:pointer;font-size:.8rem;color:#888}
.reset-btn:hover{border-color:var(--red);color:var(--red)}
.step-header{font-size:1.3rem;font-weight:700;color:var(--red);border-bottom:2px solid var(--red);padding-bottom:.5rem;margin-bottom:1.5rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1rem}
label{display:block;font-size:.8rem;font-weight:600;color:#555;margin-bottom:.3rem}
input[type=text],input[type=number],select{width:100%;padding:.5rem .75rem;border:1px solid #ddd;border-radius:6px;font-size:.9rem;outline:none}
input:focus,select:focus{border-color:var(--red)}
input[type=range]{width:100%;accent-color:var(--red)}
.range-val{font-weight:700;color:var(--red);font-size:.95rem}
.toggle-wrap{display:flex;align-items:center;gap:.75rem;margin:.5rem 0}
.toggle{position:relative;width:44px;height:24px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.slider-tog{position:absolute;inset:0;background:#ccc;border-radius:24px;transition:.3s}
.slider-tog:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:white;border-radius:50%;transition:.3s}
input:checked+.slider-tog{background:var(--red)}
input:checked+.slider-tog:before{transform:translateX(20px)}
.tier-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.tier-card{border:2px solid #e0e0e0;border-radius:10px;padding:1.2rem;cursor:pointer;transition:all .2s}
.tier-card:hover{border-color:#ffcdd2}
.tier-card.selected{border-color:var(--red);background:#fff5f5}
.tier-card h3{font-size:1rem;margin-bottom:.3rem}
.tier-card .price{font-size:1.4rem;font-weight:700;color:var(--red)}
.tier-card .sub{font-size:.75rem;color:#888;margin-bottom:.75rem}
.tier-card ul{list-style:none;font-size:.78rem;color:#555}
.tier-card ul li::before{content:"checkmark ";color:var(--green);content:"✓ "}
.intg-row{display:grid;grid-template-columns:auto 1fr 180px;align-items:center;gap:.75rem;padding:.4rem 0;border-bottom:1px solid #f5f5f5}
.intg-section{font-weight:700;font-size:.8rem;color:#888;letter-spacing:.06em;text-transform:uppercase;margin:.75rem 0 .3rem}
.del-table{width:100%;border-collapse:collapse;font-size:.85rem}
.del-table th{text-align:left;padding:.5rem .75rem;background:#f5f5f5;font-size:.78rem;font-weight:700;color:#555}
.del-table td{padding:.4rem .75rem;border-bottom:1px solid #f0f0f0}
.neg-rate{background:#fff8e1 !important}
.warn-rate{color:var(--red);font-size:.7rem}
.info-box{background:#e3f2fd;border-left:4px solid #2196F3;padding:.75rem 1rem;border-radius:4px;font-size:.85rem;margin:.75rem 0}
.warn-box{background:#fff3e0;border-left:4px solid #ff9800;padding:.75rem 1rem;border-radius:4px;font-size:.85rem;margin:.75rem 0}
.nav-btns{display:flex;justify-content:space-between;margin-top:2rem;padding-top:1rem;border-top:1px solid #eee}
.btn{padding:.6rem 1.4rem;border-radius:6px;border:none;cursor:pointer;font-size:.9rem;font-weight:600}
.btn-primary{background:var(--red);color:#fff}.btn-primary:hover{background:#b71c1c}
.btn-secondary{background:#eee;color:#555}.btn-secondary:hover{background:#e0e0e0}
.kpi{margin-bottom:1.2rem}
.kpi-val{font-size:1.7rem;font-weight:700;line-height:1}
.kpi-lbl{font-size:.72rem;color:#888;margin-top:.15rem;text-transform:uppercase;letter-spacing:.04em}
.capex-col{color:var(--blue)}
.opex-col{color:var(--amber)}
.tco-col{color:var(--green)}
.driver-row{margin:.4rem 0}
.driver-lbl{font-size:.75rem;color:#555;display:flex;justify-content:space-between}
.driver-bar{height:6px;background:#eee;border-radius:3px;margin-top:2px}
.driver-fill{height:100%;border-radius:3px;background:var(--red);transition:width .4s}
.panel-divider{height:1px;background:#eee;margin:1rem 0}
.token-warn{background:#fff3e0;border-radius:6px;padding:.5rem .75rem;font-size:.75rem;color:#e65100;margin-top:.75rem}
.metric-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.metric-box{background:#f9f9f9;border-radius:10px;padding:1rem;text-align:center}
.metric-box .val{font-size:1.6rem;font-weight:700}
.metric-box .lbl{font-size:.75rem;color:#888;margin-top:.2rem}
.tabs{display:flex;gap:0;margin-bottom:1rem;border-bottom:2px solid #eee}
.tab{padding:.5rem 1.2rem;cursor:pointer;font-size:.85rem;font-weight:600;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.tab-panel{display:none}.tab-panel.active{display:block}
table.breakdown{width:100%;border-collapse:collapse;font-size:.83rem}
table.breakdown th{background:#f5f5f5;padding:.5rem .75rem;text-align:left;font-size:.75rem;font-weight:700;color:#555}
table.breakdown td{padding:.45rem .75rem;border-bottom:1px solid #f0f0f0}
table.breakdown tr:last-child td{font-weight:700;background:#f9f9f9}
.export-row{display:flex;gap:1rem;margin-top:1.5rem}
.btn-export{padding:.7rem 1.5rem;border-radius:6px;border:none;cursor:pointer;font-weight:600;font-size:.9rem;display:flex;align-items:center;gap:.5rem}
.btn-excel{background:#1d6f42;color:#fff}.btn-excel:hover{background:#155a35}
.chart-wrap{position:relative;height:280px;margin:1rem 0}
</style>
</head>

const defaultState = () => ({
  customer_name:"", vertical:"Enterprise", industry_pack:"", timeline:"Phase 1",
  platform_tier:"professional", governance:"standard",
  num_agents:10, readiness:"reference", use_pack:false, pack_key:"telecom",

  num_users:100, concurrent_users:50, num_envs:3,

  llm_model:"bedrock_claude",
  inv_task:1000, inv_orch:200, inv_spec:500,

  phases:{ discovery:{on:true,days:10}, design:{on:true,days:15}, build:{on:true,days:40}, deploy:{on:true,days:10}, integrate:{on:true,days:20}, go_live:{on:true,days:10} },
  roles:{ solution_architect:{days:0,neg:null}, tech_lead:{days:0,neg:null}, senior_developer:{days:0,neg:null}, developer:{days:0,neg:null}, qa_engineer:{days:0,neg:null}, devops_engineer:{days:0,neg:null}, project_manager:{days:0,neg:null} },
  support_tier:"standard"

let S = defaultState();

const STEPS = ["Customer Profile","Platform Tier","Agents Catalog","Enterprise Scale","Integrations","Deployment & Infra","Token Consumption","SI / Delivery Cost","Summary & Export"];

/* ── PRICING ENGINE ── */
function calcPlatform() {
  const t = RC.platform_tiers[S.platform_tier], gm = RC.governance_multipliers[S.governance];
  return [
    { label:"Platform Setup ("+t.label+")", amount:t.setup_fee, cat:"capex" },
    { label:"Platform License - "+t.label+" ("+S.governance+" gov)", amount:t.annual_license*gm, cat:"opex", freq:"annual" }
  ];
}
function calcAgents() {
  if (S.use_pack && S.pack_key) {
    const p = RC.vertical_packs[S.pack_key];
    const lines = [{ label:"Vertical Pack - "+p.label, amount:p.base_price, cat:"capex" }];
    const extra = Math.max(0, S.num_agents - p.included_agents);
    if (extra > 0) { const cpp = RC.agent_readiness[S.readiness].cost_per_agent; lines.push({ label:"Additional Agents ("+extra+" x $"+cpp.toLocaleString()+")", amount:extra*cpp, cat:"capex" }); }
    return lines;
  }
  const cpp = RC.agent_readiness[S.readiness].cost_per_agent;
  return [{ label:"Agent Packaging ("+S.num_agents+" agents x $"+cpp.toLocaleString()+" - "+S.readiness+")", amount:S.num_agents*cpp, cat:"capex" }];
}
function calcIntegrations() {
  return Object.entries(S.integrations).flatMap(([name,cx]) => {
    const c = RC.integration_complexity[cx];
    return [
      { label:"Integration: "+name+" ("+cx+")", amount:c.capex, cat:"capex" },
      { label:"Integration Maintenance: "+name, amount:c.capex*c.maint_pct, cat:"opex", freq:"annual" }
    ];
  });
}
function getInfraTier() {
  for (const [k,t] of Object.entries(RC.infra_tiers)) if (S.num_agents<=t.max_agents && S.concurrent_users<=t.max_users) return [k,t];
  return ["large", RC.infra_tiers.large];
}
function calcInfra() {
  const [,tier] = getInfraTier();
  return S.deployment.flatMap(tgt => {
    if (tgt==="on_prem") return [
      { label:"On-Prem Server Hardware", amount:tier.on_prem.capex, cat:"capex" },
      { label:"On-Prem Annual Maintenance", amount:tier.on_prem.maint, cat:"opex", freq:"annual" }
    ];
    const c = tier[tgt]; if (!c) return [];
    return [{ label:tgt.toUpperCase()+" Infra - "+c.type+" x "+c.nodes+" nodes", amount:c.compute+c.storage+c.transfer, cat:"opex", freq:"monthly" }];
  });
}
function tokenCost(inp,out,inv,llm,buf) { const mo=inv*30; return (inp*mo/1e6*llm.input_pm+out*mo/1e6*llm.output_pm)*(1+buf); }
function calcTokens() {
  const llm = RC.llm_models[S.llm_model]; if (!llm) return [];
  const p=RC.token_profiles, b=S.gov_buffer;
  const nT=Math.round(S.num_agents*S.task_pct/100), nO=Math.round(S.num_agents*S.orch_pct/100), nS=Math.max(0,S.num_agents-nT-nO);
  return [
    { label:"Tokens - Task Agents ("+nT+" agents)", amount:tokenCost(p.task.avg_input,p.task.avg_output,S.inv_task*Math.max(nT,1),llm,b), cat:"opex", freq:"monthly" },
    { label:"Tokens - Orchestration ("+nO+" agents)", amount:tokenCost(p.orchestration.avg_input,p.orchestration.avg_output,S.inv_orch*Math.max(nO,1),llm,b), cat:"opex", freq:"monthly" },
    { label:"Tokens - Specialized ("+nS+" agents)", amount:tokenCost(p.specialized.avg_input,p.specialized.avg_output,S.inv_spec*Math.max(nS,1),llm,b), cat:"opex", freq:"monthly" }
  ];
}
function calcDelivery() {
  return Object.entries(S.roles).filter(([,rv])=>rv.days>0).map(([rk,rv]) => {
    const r=RC.delivery_roles[rk], rate=(S.delivery_mode==="tm"&&rv.neg)?rv.neg:r.std;
    return { label:"SI - "+r.label+" ("+rv.days+" days @ $"+rate.toLocaleString()+"/day)", amount:rv.days*rate, cat:"capex" };
  });
}
function calcSupport() {
  const t=RC.platform_tiers[S.platform_tier], s=RC.support_tiers[S.support_tier];
  return [{ label:"Support - "+s.label+" ("+s.desc+")", amount:Math.max(t.annual_license*s.pct,s.min), cat:"opex", freq:"annual" }];
}
function calcAll() {
  const lines=[...calcPlatform(),...calcAgents(),...calcIntegrations(),...calcInfra(),...calcTokens(),...calcDelivery(),...calcSupport()];
  const capex=lines.filter(l=>l.cat==="capex"), opex=lines.filter(l=>l.cat==="opex");
  const totalCapex=capex.reduce((s,l)=>s+l.amount,0);
  const totalOpexMo=opex.reduce((s,l)=>s+(l.freq==="monthly"?l.amount:l.amount/12),0);
  return { capex, opex, totalCapex, totalOpexMo, totalOpexAnn:totalOpexMo*12, tco3:totalCapex+totalOpexMo*12*3, lines };
}

/* ── PANEL ── */
const fmt = n => "$"+Math.round(n).toLocaleString();
function updatePanel() {
  const r=calcAll();
  document.getElementById("p-capex").textContent=fmt(r.totalCapex);
  document.getElementById("p-opex").textContent=fmt(r.totalOpexMo)+"/mo";
  document.getElementById("p-tco").textContent=fmt(r.tco3);
  const buckets={"OPEX (annual)":r.totalOpexAnn};
  r.capex.forEach(l=>{ const k=l.label.split(" ").slice(0,2).join(" "); buckets[k]=(buckets[k]||0)+l.amount; });
  const total=Object.values(buckets).reduce((a,b)=>a+b,0)||1;
  document.getElementById("drivers").innerHTML=Object.entries(buckets).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([lbl,amt])=>
    `<div class="driver-row"><div class="driver-lbl"><span>${lbl.substring(0,26)}</span><span>${Math.round(amt/total*100)}%</span></div><div class="driver-bar"><div class="driver-fill" style="width:${Math.round(amt/total*100)}%"></div></div></div>`).join("");
  const tokOpex=r.opex.filter(l=>l.label.startsWith("Tokens")).reduce((s,l)=>s+(l.freq==="monthly"?l.amount:l.amount/12),0);
  document.getElementById("token-warn").style.display=(r.totalOpexMo>0&&tokOpex/r.totalOpexMo>0.4)?"block":"none";
}

/* ── NAV ── */
function renderNav() {
  document.getElementById("nav").innerHTML=STEPS.map((n,i)=>
    `<button class="nav-item ${i===currentStep?"active":i<currentStep?"done":""}" onclick="goTo(${i})"><span class="dot"></span>${n}</button>`).join("");
}
function goTo(n){currentStep=n;renderStep();renderNav();}
function nextStep(){if(currentStep<STEPS.length-1){currentStep++;renderStep();renderNav();}}
function prevStep(){if(currentStep>0){currentStep--;renderStep();renderNav();}}
const navBtns = (back=true) => `<div class="nav-btns">${back?`<button class="btn btn-secondary" onclick="prevStep()">&#8592; Back</button>`:"<span></span>"}${currentStep<STEPS.length-1?`<button class="btn btn-primary" onclick="nextStep()">Next &#8594;</button>`:""}</div>`;

/* ── STEPS ── */
function renderStep() {
  const el=document.getElementById("main-content");
  el.innerHTML=`<div class="step-header">Step ${currentStep+1} of ${STEPS.length}: ${STEPS[currentStep]}</div>`+stepHTML();
  updatePanel();
  if(currentStep===8) setTimeout(renderCharts,120);
}

      const rows=[[nT,S.inv_task,p.task,"Task Agent"],[nO,S.inv_orch,p.orchestration,"Orchestration"],[nS,S.inv_spec,p.specialized,"Specialized"]];
      return `<div class="grid2">
        <div><label>LLM Model</label><select onchange="S.llm_model=this.value;updatePanel()">${models.map(([k,m])=>`<option value="${k}" ${S.llm_model===k?"selected":""}>${m.label}</option>`).join("")}</select>
        <div class="info-box" style="margin-top:.5rem">Input: $${llm.input_pm}/1M &bull; Output: $${llm.output_pm}/1M tokens</div></div>
        <div><label>Governance Buffer: <span class="range-val">${Math.round(b*100)}%</span></label>
          <input type="range" min="0" max="50" value="${Math.round(b*100)}" oninput="S.gov_buffer=+this.value/100;this.previousElementSibling.querySelector('.range-val').textContent=this.value+'%';updatePanel()">
          <div style="font-size:.75rem;color:#888;margin-top:.3rem">Covers retries, logging, guardrails. Customers typically underestimate by 20&ndash;35% without this.</div>
        </div>
      </div>
      <div class="grid3">
        <div><label>Task (inv/day/agent)</label><input type="number" value="${S.inv_task}" min="0" oninput="S.inv_task=+this.value;updatePanel()"></div>
        <div><label>Orchestration (inv/day/agent)</label><input type="number" value="${S.inv_orch}" min="0" oninput="S.inv_orch=+this.value;updatePanel()"></div>
        <div><label>Specialized (inv/day/agent)</label><input type="number" value="${S.inv_spec}" min="0" oninput="S.inv_spec=+this.value;updatePanel()"></div>
      </div>
      <table class="breakdown" style="margin-top:1rem"><tr><th>Agent Type</th><th>Count</th><th>Inv/Day Total</th><th>Avg Input</th><th>Avg Output</th><th>Monthly Cost</th></tr>
      ${rows.map(([n,inv,pr,lbl])=>`<tr><td>${lbl}</td><td>${n}</td><td>${(inv*Math.max(n,1)).toLocaleString()}</td><td>${pr.avg_input.toLocaleString()}</td><td>${pr.avg_output.toLocaleString()}</td><td><strong>$${Math.round(tokenCost(pr.avg_input,pr.avg_output,inv*Math.max(n,1),llm,b)).toLocaleString()}/mo</strong></td></tr>`).join("")}
      </table>${navBtns()}`;
    }

    case 7: return `<div style="display:flex;gap:1rem;margin-bottom:1rem">
      ${["fixed","tm"].map(m=>`<label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;padding:.5rem 1rem;border:1px solid ${S.delivery_mode===m?"var(--red)":"#ddd"};border-radius:6px;font-size:.88rem"><input type="radio" name="dmode" value="${m}" ${S.delivery_mode===m?"checked":""} onchange="S.delivery_mode=this.value;renderStep()"> ${m==="fixed"?"Fixed Price":"T&M (Time & Material)"}</label>`).join("")}
    </div>
    ${S.delivery_mode==="tm"?`<div class="warn-box">T&M mode: enter negotiated rates. Standard rates shown as reference.</div>`:""}
    <div style="margin:1rem 0"><strong style="font-size:.85rem">Phases</strong>
      <div class="grid3" style="margin-top:.5rem">${Object.entries(RC.delivery_phases).map(([pk,pd])=>`
        <div style="border:1px solid #eee;border-radius:6px;padding:.75rem">
          <div class="toggle-wrap" style="margin-bottom:.4rem"><label class="toggle"><input type="checkbox" ${S.phases[pk].on?"checked":""} onchange="S.phases['${pk}'].on=this.checked;updatePanel()"><span class="slider-tog"></span></label><span style="font-size:.82rem;font-weight:600">${pd.label}</span></div>
          <label style="font-size:.78rem">Days</label><input type="number" value="${S.phases[pk].days}" min="1" max="200" style="width:80px" oninput="S.phases['${pk}'].days=+this.value;updatePanel()">
        </div>`).join("")}
      </div>
    </div>
    <table class="del-table"><tr><th>Role</th><th>Days</th><th>Std Rate</th>${S.delivery_mode==="tm"?"<th>Negotiated Rate</th>":""}<th>Total</th></tr>
    ${Object.entries(RC.delivery_roles).map(([rk,rr])=>{ const rv=S.roles[rk],rate=(S.delivery_mode==="tm"&&rv.neg)?rv.neg:rr.std,tot=rv.days*rate,bf=S.delivery_mode==="tm"&&rv.neg&&rv.neg<rr.min;
      return `<tr><td>${rr.label}</td><td><input type="number" value="${rv.days}" min="0" max="500" style="width:70px" oninput="S.roles['${rk}'].days=+this.value;updatePanel()"></td><td>$${rr.std.toLocaleString()}/day</td>${S.delivery_mode==="tm"?`<td class="neg-rate"><input type="number" value="${rv.neg||rr.std}" min="0" style="width:90px" oninput="S.roles['${rk}'].neg=+this.value;updatePanel()">${bf?`<div class="warn-rate">&#9888; Below floor $${rr.min.toLocaleString()}</div>`:""}</td>`:""}<td><strong>${tot?fmt(tot):"&mdash;"}</strong></td></tr>`; }).join("")}
    </table>${navBtns()}`;

    case 8: {
      const r=calcAll();
      return `<div class="metric-row">
        <div class="metric-box"><div class="val capex-col">${fmt(r.totalCapex)}</div><div class="lbl">Total CAPEX</div></div>
        <div class="metric-box"><div class="val opex-col">${fmt(r.totalOpexMo)}/mo</div><div class="lbl">OPEX Monthly</div></div>
        <div class="metric-box"><div class="val tco-col">${fmt(r.tco3)}</div><div class="lbl">3-Year TCO</div></div>
      </div>
      <div class="tabs"><div class="tab active" onclick="switchTab(0)">CAPEX Breakdown</div><div class="tab" onclick="switchTab(1)">OPEX Breakdown</div><div class="tab" onclick="switchTab(2)">3-Year TCO</div></div>
      <div id="tab-0" class="tab-panel active"><div class="chart-wrap"><canvas id="capex-chart"></canvas></div>
        <table class="breakdown"><tr><th>Item</th><th style="text-align:right">Amount</th><th style="text-align:right">%</th></tr>
        ${r.capex.map(l=>`<tr><td>${l.label}</td><td style="text-align:right">${fmt(l.amount)}</td><td style="text-align:right">${Math.round(l.amount/(r.totalCapex||1)*100)}%</td></tr>`).join("")}
        <tr><td><strong>TOTAL CAPEX</strong></td><td style="text-align:right"><strong>${fmt(r.totalCapex)}</strong></td><td></td></tr></table></div>
      <div id="tab-1" class="tab-panel"><div class="chart-wrap"><canvas id="opex-chart"></canvas></div>
        <table class="breakdown"><tr><th>Item</th><th style="text-align:right">Monthly</th><th style="text-align:right">Annual</th></tr>
        ${r.opex.map(l=>{const mo=l.freq==="monthly"?l.amount:l.amount/12;return`<tr><td>${l.label}</td><td style="text-align:right">${fmt(mo)}/mo</td><td style="text-align:right">${fmt(mo*12)}</td></tr>`}).join("")}
        <tr><td><strong>TOTAL OPEX</strong></td><td style="text-align:right"><strong>${fmt(r.totalOpexMo)}/mo</strong></td><td style="text-align:right"><strong>${fmt(r.totalOpexAnn)}</strong></td></tr></table></div>
      <div id="tab-2" class="tab-panel"><div class="chart-wrap"><canvas id="tco-chart"></canvas></div>
        <table class="breakdown"><tr><th>Year</th><th style="text-align:right">Cumulative TCO</th></tr>
        ${[0,1,2,3].map(y=>`<tr><td>Year ${y}</td><td style="text-align:right">${fmt(r.totalCapex+r.totalOpexAnn*y)}</td></tr>`).join("")}</table></div>
      <div class="export-row"><button class="btn-export btn-excel" onclick="exportExcel()">&#128229; Download Excel Quote</button></div>
      <div class="nav-btns"><button class="btn btn-secondary" onclick="prevStep()">&#8592; Back</button><span></span></div>`;
    }
    default: return "";
  }
}

function switchTab(n) {
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",i===n));
  document.querySelectorAll(".tab-panel").forEach((p,i)=>p.classList.toggle("active",i===n));
  setTimeout(renderCharts,50);
}

function renderCharts() {
  const r=calcAll();
  const mkBar=(id,labels,data,color,prefix)=>{
    const el=document.getElementById(id); if(!el||typeof Chart==="undefined")return;
    if(charts[id]) charts[id].destroy();
    charts[id]=new Chart(el,{type:"bar",data:{labels,datasets:[{data,backgroundColor:color}]},options:{indexAxis:"y",plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>prefix+Math.round(v).toLocaleString()}}}}});
  };
  mkBar("capex-chart",r.capex.map(l=>l.label.substring(0,32)),r.capex.map(l=>l.amount),"#4fc3f7","$");
  mkBar("opex-chart",r.opex.map(l=>l.label.substring(0,32)),r.opex.map(l=>l.freq==="monthly"?l.amount:l.amount/12),"#FFB74D","$");
  const tc=document.getElementById("tco-chart");
  if(tc&&typeof Chart!=="undefined"){
    if(charts.tco)charts.tco.destroy();
    charts.tco=new Chart(tc,{type:"line",data:{labels:["Year 0","Year 1","Year 2","Year 3"],datasets:[{data:[0,1,2,3].map(y=>r.totalCapex+r.totalOpexAnn*y),borderColor:"#81C784",backgroundColor:"rgba(129,200,132,.15)",fill:true,tension:.3,pointRadius:5}]},options:{plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>"$"+Math.round(v).toLocaleString()}}}}});
  }
}

function toggleIntg(k,checked){if(checked)S.integrations[k]="medium";else delete S.integrations[k];renderStep();}
function toggleDeploy(k,checked){if(checked){if(!S.deployment.includes(k))S.deployment.push(k);}else S.deployment=S.deployment.filter(d=>d!==k);renderStep();}

function exportExcel() {
  if(typeof XLSX==="undefined"){alert("Excel export requires internet connection.");return;}
  const r=calcAll(), wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ["AgentHub Pricing Quote - Prodapt"],[""],
    ["Customer",S.customer_name||"-"],["Vertical",S.vertical],["Date",new Date().toLocaleDateString()],
    ["Platform Tier",RC.platform_tiers[S.platform_tier].label],["Deployment",S.deployment.join(", ")],[""],
    ["TOTAL CAPEX",r.totalCapex],["OPEX / Month",r.totalOpexMo],["OPEX / Year",r.totalOpexAnn],["3-Year TCO",r.tco3]
  ]),"Summary");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Description","Amount (USD)","% of Total"],...r.capex.map(l=>[l.label,l.amount,l.amount/(r.totalCapex||1)]),["TOTAL CAPEX",r.totalCapex,""]]),"CAPEX Breakdown");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Description","Monthly","Annual"],...r.opex.map(l=>{const mo=l.freq==="monthly"?l.amount:l.amount/12;return[l.label,mo,mo*12];}),["TOTAL OPEX",r.totalOpexMo,r.totalOpexAnn]]),"OPEX Breakdown");
  const llm=RC.llm_models[S.llm_model],p=RC.token_profiles,b=S.gov_buffer;
  const nT=Math.round(S.num_agents*S.task_pct/100),nO=Math.round(S.num_agents*S.orch_pct/100),nS=Math.max(0,S.num_agents-nT-nO);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["LLM",llm?.label||""],["Buffer",Math.round(b*100)+"%"],[""],["Agent Type","Count","Inv/Day","Avg Input","Avg Output","Monthly Cost"],
    ...[[nT,S.inv_task,p.task,"Task"],[nO,S.inv_orch,p.orchestration,"Orch"],[nS,S.inv_spec,p.specialized,"Spec"]].map(([n,inv,pr,lbl])=>[lbl,n,inv*Math.max(n,1),pr.avg_input,pr.avg_output,tokenCost(pr.avg_input,pr.avg_output,inv*Math.max(n,1),llm,b)])
  ]),"Token Model");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Role","Std Rate","Negotiated","Mode","Days","Total"],...Object.entries(RC.delivery_roles).map(([rk,rr])=>{const rv=S.roles[rk],rate=(S.delivery_mode==="tm"&&rv.neg)?rv.neg:rr.std;return[rr.label,rr.std,rv.neg||"-",S.delivery_mode.toUpperCase(),rv.days,rv.days*rate];})]),"Rate Card");
  XLSX.writeFile(wb,"AgentHub_Quote_"+(S.customer_name||"Customer")+".xlsx");
}

function resetQuote(){if(confirm("Reset all inputs?")){S=defaultState();currentStep=0;init();}}
function init(){renderNav();renderStep();updatePanel();}
init();
</script>
